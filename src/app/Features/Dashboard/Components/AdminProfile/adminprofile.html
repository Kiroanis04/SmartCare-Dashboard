<div class="admin-profile-card" *ngIf="profile">
  <div class="profile-container">
    <div class="profile-avatar">
      <img [src]="profile.avatar" [alt]="profile.username" class="avatar">
      <div class="online-status"></div>
    </div>

    <div class="profile-info">
      <div class="welcome-section">
        <span class="greeting-text">Welcome,</span>
        <div class="name-wrapper">
          <span #usernameSpan class="animated-name"></span>
        </div>
      </div>

      <div class="profile-details">
        <div class="detail-item">
          <span class="detail-label">Role</span>
          <span class="detail-value">{{ profile.role }}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Email</span>
          <span class="detail-value">{{ profile.email }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
