<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
 <div class="login-wrapper">
  <div class="glass-stack">
    <div class="login-container">
      <div class="logo-section">
        <!--<img src="/Icons/smartcare_logo.png" alt="Smartcare Logo" class="logo-img">-->
        <h1 class="brand-name">Smart<span style="color: #89CFF0;">care</span></h1>
      </div>

      <h2 class="login-title">Log in to Smartcare</h2>

      <form [formGroup]="loginForm" class="login-form">
        <div class="input-group">
          <input formControlName="email" type="email" placeholder="yourname@example.com" required>
        </div>

        <div class="input-group">
          <input formControlName="password" type="password" placeholder="********" required>
        </div>

        <a href="#" class="forgot-password">Forgot Password?</a>

        <button type="submit" class="login-btn" (click)="OnLogin()">Log In</button>
      </form>

      <div class="footer-links">
        <!-- <p>Don't have an account? <a href="#">Sign Up</a></p> -->
        <div class="legal">
          <a href="#">Privacy Policy</a> • <a href="#">Terms of Service</a>
        </div>
      </div>
  </div>
</div>
 </div>
</body>
</html>
